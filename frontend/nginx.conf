server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # All routes fall back to index.html — required for React client-side routing.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API Reverse Proxy — hides backend behind Nginx
    # All requests to /api are forwarded to the internal backend container's port 3003
    location /api/ {
        proxy_pass http://backend:3003/; # The trailing slash strips /api before forwarding
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Cache static assets aggressively — content-hashed filenames mean
    # old files are never served after a new build.
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Disable caching for the HTML entry point — must always be fresh
    # so the browser picks up new JS/CSS bundle filenames after a deploy
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Security headers
    add_header X-Frame-Options "DENY";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # Gzip compression for faster transfers
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
}
