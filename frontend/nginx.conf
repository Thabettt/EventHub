server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # All routes fall back to index.html — required for React client-side routing.
    # Without this, a direct visit to /events/123 would return a 404 from Nginx
    # because there is no physical file at that path. React Router handles routing
    # in the browser — Nginx just needs to serve index.html for all paths.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively — content-hashed filenames mean
    # old files are never served after a new build.
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Disable caching for the HTML entry point — must always be fresh
    # so the browser picks up new JS/CSS bundle filenames after a deploy
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Security headers
    add_header X-Frame-Options "DENY";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # Gzip compression for faster transfers
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
}
